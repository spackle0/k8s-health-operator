---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies/status
  verbs:
  - get
  - patch
  - update
