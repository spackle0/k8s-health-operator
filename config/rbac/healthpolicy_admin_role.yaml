# This rule is not used by the project k8s-health-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over monitoring.hugh.local.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-health-operator
    app.kubernetes.io/managed-by: kustomize
  name: healthpolicy-admin-role
rules:
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies
  verbs:
  - '*'
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies/status
  verbs:
  - get
