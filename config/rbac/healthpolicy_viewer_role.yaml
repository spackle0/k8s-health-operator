# This rule is not used by the project k8s-health-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to monitoring.hugh.local resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-health-operator
    app.kubernetes.io/managed-by: kustomize
  name: healthpolicy-viewer-role
rules:
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies/status
  verbs:
  - get
