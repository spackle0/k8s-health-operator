# This rule is not used by the project k8s-health-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the monitoring.hugh.local.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-health-operator
    app.kubernetes.io/managed-by: kustomize
  name: healthpolicy-editor-role
rules:
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.hugh.local
  resources:
  - healthpolicies/status
  verbs:
  - get
