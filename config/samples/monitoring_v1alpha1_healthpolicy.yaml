apiVersion: monitoring.hugh.local/v1alpha1
kind: HealthPolicy
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: k8s-health-operator
  name: healthpolicy-sample
spec:
  namespaces:
    - default
  reportingInterval: 30s
  rules:
    - type: CrashLoopDetection
      crashLoop:
        threshold: 3
    - type: OOMKillDetection
    - type: PendingPodDetection
      pendingPod:
        threshold: 5m
